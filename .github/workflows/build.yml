name: build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  protocol-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run protocol tests
        run: cargo test --manifest-path crates/protocol/Cargo.toml

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop dependencies
        run: npm install
        working-directory: totti-pad
      - name: Build desktop frontend
        run: npm run build --workspace apps/desktop
        working-directory: totti-pad
      - name: Build Windows installer
        run: npm run tauri:build --workspace apps/desktop
        working-directory: totti-pad
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            totti-pad/apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop dependencies
        run: npm install
        working-directory: totti-pad
      - name: Build desktop frontend
        run: npm run build --workspace apps/desktop
        working-directory: totti-pad
      - name: Build macOS bundle
        run: npm run tauri:build --workspace apps/desktop
        working-directory: totti-pad
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            totti-pad/apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Gradle wrapper
        run: gradle wrapper
        working-directory: totti-pad/apps/android
      - name: Assemble debug APK
        run: ./gradlew assembleDebug
        working-directory: totti-pad/apps/android
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: totti-pad/apps/android/app/build/outputs/apk/debug/*.apk
